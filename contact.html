<!doctype html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>اتصل بنا</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container"><a class="navbar-brand" href="index.html">دليل فعاليات المدينة</a></div>
    </nav>

    <main class="container my-4">
        <h2>اتصل بنا</h2>
        <div id="contact-alert"></div>

        <form id="contact-form" novalidate>
            <div class="mb-3">
                <label class="form-label">الاسم</label>
                <input id="contact-name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">البريد الإلكتروني</label>
                <input id="contact-email" class="form-control" type="email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">الرسالة</label>
                <textarea id="contact-message" class="form-control" rows="5" required></textarea>
            </div>
            <button class="btn btn-primary" type="submit">إرسال</button>
        </form>
    </main>

    <footer class="bg-dark text-white py-3">
        <div class="container d-flex justify-content-between">
            <div>© حقوق النشر 2025</div>
            <div>البريد: shahed@gmail.com  </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>


</html>
