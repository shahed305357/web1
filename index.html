<!doctype html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>دليل فعاليات المدينة</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="assets/img/logo.png" alt="logo" style="height:40px;">
                دليل فعاليات المدينة
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">الفعاليات</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">عن الدليل</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">اتصل بنا</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">

        <!-- Featured carousel -->
        <section id="featured-section" class="mb-4">
            <h2 class="mb-3">فعاليات بارزة هذا الأسبوع</h2>
            <div id="featuredCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner" id="featured-carousel-inner">
                    <!-- slides populated by JS -->
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#featuredCarousel"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#featuredCarousel"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </section>

        <!-- Quick categories -->
        <section id="quick-cats" class="mb-4">
            <h3>التصنيفات السريعة</h3>
            <div id="category-badges" class="d-flex gap-2 flex-wrap">
                <!-- badges by JS -->
            </div>
        </section>

        <!-- Latest events grid -->
        <section id="latest-events">
            <h3 class="mb-3">أحدث الفعاليات</h3>
            <div class="row" id="latest-cards">
                <!-- cards populated by JS -->
            </div>
            <div class="text-end mt-3">
                <a href="events.html" class="btn btn-outline-primary">عرض كل الفعاليات</a>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-3">
        <div class="container d-flex justify-content-between">
            <div>© حقوق النشر 2025 - دليل فعاليات المدينة</div>
            <div>البريد: shahed@gmail.com  </div>
        </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JS -->
    <script src="assets/js/main.js"></script>
</body>


</html>
